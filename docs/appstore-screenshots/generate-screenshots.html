<title>Gerador de Screenshots — App Store</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: #0A0A0F;
    color: #fff;
    padding: 32px;
  }
  h1 { font-size: 28px; margin-bottom: 8px; }
  .subtitle { color: #A0A0AB; margin-bottom: 32px; font-size: 15px; }
  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 20px;
    margin-bottom: 40px;
  }
  .card {
    background: #1A1A24;
    border-radius: 16px;
    overflow: hidden;
    transition: transform 0.2s;
  }
  .card:hover { transform: translateY(-4px); }
  .card canvas, .card img {
    width: 100%;
    height: auto;
    display: block;
  }
  .card-info {
    padding: 12px;
  }
  .card-info h3 { font-size: 14px; margin-bottom: 4px; }
  .card-info p { font-size: 11px; color: #6B6B78; margin-bottom: 8px; }
  .btn {
    display: inline-block;
    background: #2171BA;
    color: #fff;
    border: none;
    padding: 10px 16px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    text-align: center;
    text-decoration: none;
    transition: background 0.2s;
  }
  .btn:hover { background: #399BD8; }
  .btn-all {
    background: #DC2828;
    padding: 16px 40px;
    font-size: 16px;
    border-radius: 999px;
    border: none;
    color: #fff;
    font-weight: 700;
    cursor: pointer;
  }
  .btn-all:hover { background: #E55050; }
  .btn-seq {
    background: #50A03C;
    padding: 16px 40px;
    font-size: 16px;
    border-radius: 999px;
    border: none;
    color: #fff;
    font-weight: 700;
    cursor: pointer;
  }
  .btn-seq:hover { background: #6BC050; }
  .progress-bar {
    width: 100%;
    height: 6px;
    background: #252530;
    border-radius: 3px;
    margin: 16px 0;
    display: none;
  }
  .progress-fill {
    height: 100%;
    background: #50A03C;
    border-radius: 3px;
    transition: width 0.3s;
    width: 0%;
  }
  .status {
    padding: 12px 20px;
    background: #252530;
    border-radius: 12px;
    font-size: 14px;
    color: #50A03C;
    margin-bottom: 16px;
    display: none;
  }
  .download-links {
    background: #1A1A24;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 32px;
  }
  .download-links h2 { font-size: 18px; margin-bottom: 16px; }
  .download-links a {
    display: block;
    color: #2171BA;
    text-decoration: none;
    padding: 12px 16px;
    border-radius: 12px;
    margin-bottom: 4px;
    font-size: 15px;
    font-weight: 500;
    transition: background 0.2s;
  }
  .download-links a:hover { background: #252530; }
  .download-links a .check { color: #50A03C; margin-left: 8px; display: none; }
  .download-links a.downloaded .check { display: inline; }
  .specs {
    background: #1A1A24;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .specs table { width: 100%; border-collapse: collapse; }
  .specs td, .specs th {
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid #32323E;
    font-size: 13px;
  }
  .specs th { color: #A0A0AB; font-weight: 500; }
</style>

}
function drawRR(ctx, x, y, w, h, r) {

}

function drawAppIcon(ctx,cx,cy,size) {
  const r=size*0.22,x=cx-size/2,y=cy-size/2;
  ctx.save(); ctx.shadowColor='rgba(0,0,0,0.3)'; ctx.shadowBlur=20; ctx.shadowOffsetY=8;

    ctx.save();
    drawRR(ctx,x,y,size,size,r); ctx.clip();
    ctx.drawImage(_appIconImg, x, y, size, size);
    ctx.restore();
  }

const screenshotConfigs = [
  { id:'login',  title:'1. Login',     bgGradient:[BRAND.red,BRAND.darkRed],        headline:'FAÇA PARTE\nDA MUDANÇA',       subtitle:'PARTICIPE. MOBILIZE. TRANSFORME.',                   render:renderLoginScreen },
  { id:'home',   title:'2. Dashboard', bgGradient:[BRAND.red,BRAND.darkRed],        headline:'ACOMPANHE\nSEU PROGRESSO',     subtitle:'Ganhe pontos, suba de nível, conquiste badges',      render:renderHomeScreen },
  { id:'missions',title:'3. Missões',  bgGradient:[BRAND.blue,BRAND.darkBlue],      headline:'COMPLETE\nMISSÕES',            subtitle:'Ações reais que geram impacto na sua comunidade',    render:renderMissionsScreen },
  { id:'ranking',title:'4. Ranking',   bgGradient:[BRAND.green,BRAND.darkGreen],    headline:'DISPUTE\nO RANKING',           subtitle:'Veja sua posição e desafie outros embaixadores',     render:renderRankingScreen },
  { id:'events', title:'5. Eventos',   bgGradient:['#C0387A',BRAND.darkPurple],     headline:'EVENTOS\nE CONVITES',          subtitle:'Participe de ações presenciais e mobilize sua rede', render:renderEventsScreen },
];

const allCanvases = [];
const grid = document.getElementById('grid');
const linkList = document.getElementById('linkList');
linkList.innerHTML = 'Carregando ícone...';

_appIconReady.then(() => {
linkList.innerHTML = '';

screenshotConfigs.forEach((cfg, idx) => {
  // Create full-size canvas
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Background
  drawGradient(ctx, cfg.bgGradient, 0, 0, W, H);
  const glow = ctx.createRadialGradient(W/2, H*0.3, 0, W/2, H*0.3, W*0.8);
  glow.addColorStop(0,'rgba(255,255,255,0.06)'); glow.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = glow; ctx.fillRect(0,0,W,H);

  // Icon
  drawAppIcon(ctx, W/2, 200, 140);

  // Headline
  ctx.textAlign='center'; ctx.textBaseline='top';
  const lines = cfg.headline.split('\n');
  ctx.font='900 96px -apple-system,"SF Pro Display",sans-serif'; ctx.fillStyle='#fff';
  lines.forEach((l,i) => ctx.fillText(l, W/2, 310 + i*108));

  // Subtitle
  const subY = 310 + lines.length*108 + 16;
  ctx.font='italic 600 36px -apple-system,sans-serif'; ctx.fillStyle=BRAND.yellow;
  ctx.fillText(cfg.subtitle, W/2, subY);

  // Phone
  const phoneX=(W-PHONE_W)/2, phoneY=subY+80;
  const {sx,sy,sw,sh} = drawPhoneFrame(ctx, phoneX, phoneY);
  drawStatusBar(ctx, sx, sy, sw);
  cfg.render(ctx, sx, sy, sw, sh);
  ctx.restore();

  // Convert to blob URL for download link
  const dataUrl = canvas.toDataURL('image/png');
  allCanvases.push({ canvas, dataUrl, cfg });

  // Create download link
  const link = document.createElement('a');
  link.href = dataUrl;
  link.download = `appstore_${cfg.id}_1284x2778.png`;
  link.innerHTML = `⬇️ ${cfg.title} — appstore_${cfg.id}_1284x2778.png <span class="check">✅</span>`;
  link.onclick = () => { setTimeout(() => link.classList.add('downloaded'), 500); };
  linkList.appendChild(link);

  // Preview card
  const card = document.createElement('div');
  card.className = 'card';
  const preview = document.createElement('canvas');
  preview.width = 257; preview.height = 556;
  preview.getContext('2d').drawImage(canvas, 0, 0, 257, 556);
  const info = document.createElement('div');
  info.className = 'card-info';
  info.innerHTML = `<h3>${cfg.title}</h3><p>1284×2778px</p>`;
  card.appendChild(preview);
  card.appendChild(info);
  grid.appendChild(card);
});

document.getElementById('btnSeq').disabled = false;
}); // end _appIconReady.then

let seqIndex = 0;
function downloadSequential() {
  if (seqIndex >= allCanvases.length) {
    showStatus('✅ Todos os 5 screenshots baixados!');
    seqIndex = 0;
    return;
  }
  const { dataUrl, cfg } = allCanvases[seqIndex];
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = `appstore_${cfg.id}_1284x2778.png`;
  a.click();
  
  const links = linkList.querySelectorAll('a');
  if (links[seqIndex]) links[seqIndex].classList.add('downloaded');
  
  seqIndex++;
  showStatus(`📥 Baixando ${seqIndex}/${allCanvases.length}...`);
  
  const pb = document.getElementById('progressBar');
  const pf = document.getElementById('progressFill');
  pb.style.display = 'block';
  pf.style.width = `${(seqIndex/allCanvases.length)*100}%`;
  
  if (seqIndex < allCanvases.length) {
    setTimeout(downloadSequential, 3000);
  } else {
    setTimeout(() => showStatus('✅ Todos os 5 screenshots baixados! Pronto para o App Store Connect.'), 500);
  }
}

function showStatus(msg) {
  const el = document.getElementById('status');
  el.textContent = msg; el.style.display = 'block';
}
</script>
</body>
</html>
