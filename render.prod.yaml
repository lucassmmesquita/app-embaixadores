# ═══════════════════════════════════════════════════════════════
#  Render Blueprint — PRODUÇÃO
#  Branch: main
#  Serviço único: API + PWA + Admin (static export)
#
#  MUDANÇAS em relação ao blueprint anterior de prod:
#  - Removido rootDir (agora compila a partir da raiz)
#  - buildCommand: compila PWA + Admin + instala pip
#  - startCommand: roda alembic migrations antes de iniciar
#  - Env vars novas: ADMIN_JWT_SECRET, WEB_APP_URL,
#    DATABASE_USE_POOLER, API_SECRET_KEY, ENVIRONMENT,
#    EXPO_PUBLIC_API_URL, EXPO_PUBLIC_SUPABASE_URL
# ═══════════════════════════════════════════════════════════════
version: "1"
projects:
- name: APP-Embaixadores
  environments:
  - name: Production
    services:
    - type: web
      name: app-embaixadores
      runtime: python
      repo: https://github.com/lucassmmesquita/app-embaixadores
      branch: main
      plan: starter
      region: oregon
      buildCommand: >-
        command -v pnpm || npm install -g pnpm &&
        cd app && pnpm install &&
        EXPO_PUBLIC_API_URL=$EXPO_PUBLIC_API_URL
        EXPO_PUBLIC_SUPABASE_URL=$EXPO_PUBLIC_SUPABASE_URL
        EXPO_BASE_URL=/app
        npx expo export --platform web --output-dir ../backend/src/webapp &&
        cd ../admin && npm install &&
        NEXT_OUTPUT_MODE=export
        NEXT_PUBLIC_BASE_PATH=/admin
        NEXT_PUBLIC_API_URL=$EXPO_PUBLIC_API_URL
        npx next build &&
        mkdir -p ../backend/src/adminweb &&
        cp -r out/* ../backend/src/adminweb/ &&
        cd ../backend &&
        pip install -r requirements.txt
      startCommand: cd backend && alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port $PORT
      autoDeployTrigger: commit
      envVars:
      # ═══ DATABASE (Supabase Prod — pooler connection) ═══
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USE_POOLER
        sync: false
      # ═══ SUPABASE AUTH (Prod) ═══
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      # ═══ API AUTH ═══
      - key: API_SECRET_KEY
        sync: false
      - key: ADMIN_JWT_SECRET
        sync: false
      # ═══ APP CONFIG ═══
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: WEB_APP_URL
        sync: false
      - key: API_CORS_ORIGINS
        sync: false
      # ═══ EXPO / PWA (usados no build) ═══
      - key: EXPO_PUBLIC_API_URL
        sync: false
      - key: EXPO_PUBLIC_SUPABASE_URL
        sync: false
      # ═══ GOOGLE OAUTH ═══
      - key: EXPO_PUBLIC_GOOGLE_CLIENT_ID
        sync: false
      - key: EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID
        sync: false
      - key: EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID
        sync: false
