services:
  - type: web
    name: embaixadores-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: API_SECRET_KEY
        generateValue: true
      - key: API_ENVIRONMENT
        value: production
      - key: API_DEBUG
        value: "false"
      - key: API_CORS_ORIGINS
        value: "https://embaixadores.vercel.app,https://app-embaixadores.vercel.app"
    healthCheckPath: /health
    autoDeploy: true
