# ═══════════════════════════════════════════════════════════════
#  Rede de Embaixadores — Docker Compose PRODUCTION
#  Optimized builds, no volumes, external database
#  Usage: docker compose -f infra/compose/docker-compose.prod.yml up -d
# ═══════════════════════════════════════════════════════════════

services:
  # ═══ Backend API (gunicorn + uvicorn workers) ═══
  api:
    build:
      context: ../../
      dockerfile: infra/docker/backend/Dockerfile.prod
    container_name: embaixadores-api
    ports:
      - "8000:8000"
    env_file:
      - ../../.env.prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ═══ Admin Panel (Next.js standalone) ═══
  admin:
    build:
      context: ../../
      dockerfile: infra/docker/admin/Dockerfile.prod
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.embaixadores.com}
        - NEXT_PUBLIC_SHOW_DEV_CREDENTIALS=false
    container_name: embaixadores-admin
    ports:
      - "3002:3002"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
