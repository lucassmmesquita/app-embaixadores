# ═══════════════════════════════════════════════════════════════
#  Rede de Embaixadores — Docker Compose
#  Backend API + PostgreSQL local para desenvolvimento
#  Usage: docker compose up -d
# ═══════════════════════════════════════════════════════════════

services:
  # ═══ PostgreSQL Database ═══
  db:
    image: postgres:16-alpine
    container_name: embaixadores-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: embaixadores
      POSTGRES_USER: embaixadores
      POSTGRES_PASSWORD: embaixadores_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U embaixadores -d embaixadores"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ═══ Backend API ═══
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: embaixadores-api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.docker
    volumes:
      # Hot-reload: changes to these dirs are reflected immediately
      - ./backend/src:/app/src
      - ./backend/alembic:/app/alembic
      - ./backend/scripts:/app/scripts
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

volumes:
  pgdata:
    driver: local
